<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StreamFlix</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header class="navbar">
        <div class="logo">
            STREAMFLIX
        </div>
        <div class="menu">

            <a href="#">Home</a>
            <a href="#">Series</a>
            <a href="#">Games</a>
            <a href="#">My List</a>

        </div>
        <div class="actions">

            <input type="text" placeholder="Search Games">
            <a href="login.html">
                <button type="button">Sign In</button>
            </a>
            <div class="user">
                <a href="">
                    <img src="user.webp">
                </a>
            </div>

        </div>
    </header>
    <section class="hero">
        <div class="hero-content">
            <h1>
                The Last Adventure
            </h1>
            <p>
                A journey full of mystery, action and unforgettable moments.
                Watch unlimited movies and series.
            </p>
            <div>
                <button class="play">
                    ▶ Play
                </button>
                <button class="more">
                    More Info
                </button>
            </div>
        </div>
    </section>
    <section class="container">
        <h2>
            Trending Now
        </h2>
        <div class="cards">
            <div class="card">
                <img src="tr1.jpg">
            </div>
            <div class="card">
                <img src="tr2.jpg">
            </div>
            <div class="card">
                <img src="tr3.jpg">
            </div>
            <div class="card">
                <img src="tr4.jpg">
            </div>
            <div class="card">
                <img src="tr5.jpg">
            </div>
        </div>
        <h2>
            Popular Games
        </h2>
        <div class="cards">
            <div class="card">
                <img src="game5.jpg">
            </div>
            <div class="card">
                <img src="game4.jpg">
            </div>
            <div class="card">
                <img src="game6.jpg">
            </div>
            <div class="card">
                <img src="game1.jpg">
            </div>
            <div class="card">
                <img src="game2.jpg">
            </div>
        </div>
    </section>
    <footer>
        <h3>StreamFlix</h3>
        <p>
            Created by Tejas Misal
        </p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
